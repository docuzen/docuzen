name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: shellcheck install.sh installer/docuzen installer/test/hermetic.sh installer/test/bootstrap.sh
      - name: hermetic install/verify/uninstall test
        run: bash installer/test/hermetic.sh
      - name: install.sh OS-guard test
        run: bash installer/test/bootstrap.sh
